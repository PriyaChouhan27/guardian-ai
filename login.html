<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guardian AI</title>
    <meta name="description" content="Sign in to your Guardian AI account. Travel Smarter. Travel Safer.">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-entry-active">
    <!-- Interactive Background Canvas -->
    <canvas id="constellation-canvas"></canvas>
    
    <!-- Light glowing atmospheric effects -->
    <div class="glow-orb glow-top-left"></div>
    <div class="glow-orb glow-bottom-right"></div>

    <main class="login-wrapper">
        <div class="login-card animate-fade-in">
            <!-- Header Section -->
            <header class="login-header">
                <a href="index.html" class="logo-link" title="Back to Splash Screen">
                    <svg class="login-logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Outer Shield Path -->
                        <path class="logo-shield-outer" d="M 60 16 L 98 28 V 65 C 98 88 60 104 60 104 C 60 104 22 88 22 65 V 28 Z" stroke="url(#shieldGradient)" stroke-width="3" stroke-linejoin="round"/>
                        <!-- Inner Tech-Mesh Shield -->
                        <path class="logo-shield-inner" d="M 60 28 L 86 37 V 65 C 86 81 60 93 60 93 C 60 93 34 81 34 65 V 37 Z" stroke="url(#innerShieldGradient)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        <!-- Core Glowing Node -->
                        <circle cx="60" cy="60" r="8" fill="url(#coreGradient)" />
                        
                        <defs>
                            <linearGradient id="shieldGradient" x1="22" y1="16" x2="98" y2="104" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#1d4ed8" />
                            </linearGradient>
                            <linearGradient id="innerShieldGradient" x1="34" y1="28" x2="86" y2="93" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#38bdf8" />
                                <stop offset="100%" stop-color="#0369a1" stop-opacity="0.3"/>
                            </linearGradient>
                            <linearGradient id="coreGradient" x1="52" y1="52" x2="68" y2="68" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#60a5fa" />
                                <stop offset="100%" stop-color="#2563eb" />
                            </linearGradient>
                        </defs>
                    </svg>
                </a>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Secure access to your smart travel network</p>
            </header>

            <!-- Login Form -->
            <form class="login-form" id="form-login" onsubmit="event.preventDefault();">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="name@company.com" required autocomplete="email">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <div class="form-label-row">
                        <label for="password" class="form-label">Password</label>
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <!-- Password Show/Hide Toggle -->
                        <button type="button" class="password-toggle-btn" id="btn-toggle-password" aria-label="Toggle Password Visibility">
                            <!-- Eye icon (default state: hidden) -->
                            <svg id="eye-icon-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Off icon (visible state) -->
                            <svg id="eye-icon-visible" class="hidden-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary btn-full-width" id="btn-login-submit">
                    <span class="btn-text">Log In</span>
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </span>
                    <div class="btn-glow"></div>
                </button>
            </form>

            <!-- Social Divider -->
            <div class="auth-divider">
                <span class="divider-text">OR</span>
            </div>

            <!-- OAuth Options -->
            <button type="button" class="btn-oauth" id="btn-google-auth">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Navigation Links -->
            <footer class="login-card-footer">
                <p>Don't have an account? <a href="signup.html" class="link-primary" id="link-signup">Sign Up</a></p>
            </footer>
        </div>
    </main>

    <!-- Bottom Footer (Minimalist & Premium Brand Signature) -->
    <footer class="splash-footer animate-fade-in-delayed-4">
        <p>&copy; 2026 Guardian AI Technologies. All travel networks secured.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
